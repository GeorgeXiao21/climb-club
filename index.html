<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edinburgh Chinese Climbing Club</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, PingFang SC, Microsoft YaHei;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
        }
        nav {
            background: #222;
            padding: 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 99;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 12px;
            font-size: 15px;
        }
        nav a:hover {
            color: #ff6b35;
        }
        .banner {
            background: linear-gradient(135deg, #2c3e50, #4a6984);
            color: #fff;
            text-align: center;
            padding: 60px 20px;
        }
        .banner h1 {
            font-size: 36px;
            margin-bottom: 12px;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .box {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 15px #00000010;
        }
        h2 {
            margin-bottom: 16px;
            border-left: 4px solid #ff6b35;
            padding-left: 12px;
        }
        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }
        button {
            background: #ff6b35;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .item {
            padding: 14px;
            border-bottom: 1px solid #eee;
        }
        .time {
            color: #999;
            font-size: 13px;
        }
        footer {
            text-align: center;
            padding: 30px;
            color: #888;
        }
    </style>
</head>
<body>
    <nav>
        <a href=" ">俱乐部简介</a >
        <a href="#notice">公告</a >
        <a href="#activity">活动预约</a >
        <a href="#member">队员风采</a >
        <a href="#message">留言</a >
    </nav>

    <div class="banner">
        <h1>爱丁堡华人攀岩俱乐部</h1>
        <p>突破高度 · 挑战自我 · 以岩会友</p >
    </div>

    <div class="container">
        <div id="about" class="box">
            <h2>俱乐部简介</h2>
            <p>本地华人攀岩兴趣社群，开设室内抱石、难度攀、户外野攀，零基础可学，定期组织拉练、团建活动。</p >
        </div>

        <div id="notice" class="box">
            <h2>最新公告</h2>
            <input id="noticeTitle" placeholder="公告标题">
            <textarea id="noticeContent" placeholder="公告内容"></textarea>
            <button onclick="addNotice()">发布公告</button>
            <div id="noticeList"></div>
        </div>

        <div id="activity" class="box">
            <h2>活动预约报名</h2>
            <input id="userName" placeholder="昵称/姓名">
            <input id="userPhone" placeholder="联系方式">
            <input id="actName" placeholder="报名活动名称（如：周末新手岩训）">
            <textarea id="actNote" placeholder="备注"></textarea>
            <button onclick="signActivity()">提交报名</button>
            <div id="actList"></div>
        </div>

        <div id="member" class="box">
            <h2>队员风采</h2>
            <input id="mName" placeholder="队员昵称">
            <input id="mTag" placeholder="标签：新手/野攀/抱石">
            <textarea id="mIntro" placeholder="个人攀岩简介"></textarea>
            <button onclick="addMember()">添加队员</button>
            <div id="memberList"></div>
        </div>

        <div id="message" class="box">
            <h2>岩友留言区</h2>
            <input id="msgName" placeholder="昵称">
            <textarea id="msgText" placeholder="留言内容"></textarea>
            <button onclick="addMessage()">发表留言</button>
            <div id="msgList"></div>
        </div>
    </div>

    <footer>爱丁堡华人攀岩俱乐部 © 2026</footer>

    <script>
        function getLocal(key){
            let d = localStorage.getItem(key);
            return d ? JSON.parse(d) : [];
        }
        function saveLocal(key,data){
            localStorage.setItem(key,JSON.stringify(data));
        }

        function addNotice(){
            let title = document.getElementById("noticeTitle").value.trim();
            let content = document.getElementById("noticeContent").value.trim();
            if(!title||!content)return alert("请填写完整");
            let list = getLocal("clubNotice");
            list.unshift({title,content,time:new Date().toLocaleString()});
            saveLocal("clubNotice",list);
            alert("发布成功");
            loadNotice();
            document.getElementById("noticeTitle").value = "";
            document.getElementById("noticeContent").value = "";
        }
        function loadNotice(){
            let list = getLocal("clubNotice");
            let wrap = document.getElementById("noticeList");
            wrap.innerHTML = list.length ? list.map(i=>`
                <div class="item">
                    <h4>${i.title}</h4>
                    <p>${i.content}</p >
                    <div class="time">${i.time}</div>
                </div>`).join("") : "<p>暂无公告</p >";
        }

        function signActivity(){
            let name = document.getElementById("userName").value.trim();
            let phone = document.getElementById("userPhone").value.trim();
            let act = document.getElementById("actName").value.trim();
            let note = document.getElementById("actNote").value.trim();
            if(!name||!phone||!act)return alert("姓名、电话、活动必填");
            let list = getLocal("clubActSign");
            list.unshift({name,phone,act,note,time:new Date().toLocaleString()});
            saveLocal("clubActSign",list);
            alert("报名提交成功");
            loadAct();
            document.getElementById("userName").value = "";
            document.getElementById("userPhone").value = "";
            document.getElementById("actName").value = "";
            document.getElementById("actNote").value = "";
        }
        function loadAct(){
            let list = getLocal("clubActSign");
            let wrap = document.getElementById("actList");
            wrap.innerHTML = list.length ? list.map(i=>`
                <div class="item">
                    <p><strong>报名人：</strong>${i.name}</p >
                    <p><strong>联系方式：</strong>${i.phone}</p >
                    <p><strong>活动：</strong>${i.act}</p >
                    <p><strong>备注：</strong>${i.note||"无"}</p >
                    <div class="time">${i.time}</div>
                </div>`).join("") : "<p>暂无报名记录</p >";
        }

        function addMember(){
            let name = document.getElementById("mName").value.trim();
            let tag = document.getElementById("mTag").value.trim();
            let intro = document.getElementById("mIntro").value.trim();
            if(!name)return alert("请填写队员昵称");
            let list = getLocal("clubMember");
            list.unshift({name,tag,intro,time:new Date().toLocaleString()});
            saveLocal("clubMember",list);
            alert("队员添加成功");
            loadMember();
            document.getElementById("mName").value = "";
            document.getElementById("mTag").value = "";
            document.getElementById("mIntro").value = "";
        }
        function loadMember(){
            let list = getLocal("clubMember");
            let wrap = document.getElementById("memberList");
            wrap.innerHTML = list.length ? list.map(i=>`
                <div class="item">
                    <h4>${i.name} <span style="color:#ff6b35;font-size:13px">${i.tag}</span></h4>
                    <p>${i.intro||"暂无介绍"}</p >
                </div>`).join("") : "<p>暂无队员展示</p >";
        }

        function addMessage(){
            let name = document.getElementById("msgName").value.trim();
            let text = document.getElementById("msgText").value.trim();
            if(!name||!text)return alert("昵称和留言内容必填");
            let list = getLocal("clubMessage");
            list.unshift({name,text,time:new Date().toLocaleString()});
            saveLocal("clubMessage",list);
            alert("留言成功！");
            loadMessage();
            document.getElementById("msgName").value = "";
            document.getElementById("msgText").value = "";
        }
        function loadMessage(){
            let list = getLocal("clubMessage");
            let wrap = document.getElementById("msgList");
            wrap.innerHTML = list.length ? list.map(i=>`
                <div class="item">
                    <strong>${i.name}</strong>
                    <p>${i.text}</p >
                    <div class="time">${i.time}</div>
                </div>`).join("") : "<p>暂无留言，快来抢沙发！</p >";
        }

        window.onload = function(){
            loadNotice();
            loadAct();
            loadMember();
            loadMessage();
        }
    </script>
</body>
</html>
